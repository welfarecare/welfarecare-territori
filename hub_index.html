<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>WelfareCare — Portale Organizzazione</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --wc:#26ADE4;--wcd:#1a8fc2;--wcl:#e8f6fc;
  --bg:#f0f4f8;--sur:#fff;--sur2:#f7f9fb;
  --bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.12);
  --tx:#0d1117;--tx2:#4a5568;--tx3:#94a3b8;
  --f:'Poppins',sans-serif;--r:12px;--rl:18px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{font-family:var(--f);-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}

/* ── AUTH ── */
.auth-overlay{position:fixed;inset:0;background:linear-gradient(150deg,#0d1117 0%,#1a2744 55%,#0e3a5c 100%);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
.auth-overlay.hidden{display:none}
.auth-box{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px 32px;width:100%;max-width:420px}
.auth-logo{margin-bottom:28px;text-align:center}
.auth-logo svg{width:190px;height:auto}
.auth-err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:var(--r);margin-bottom:14px;display:none}
.auth-fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.auth-fl{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.03em}
.auth-fi{font-family:var(--f);font-size:16px;padding:13px 14px;border:1px solid rgba(255,255,255,.12);border-radius:var(--r);background:rgba(255,255,255,.06);color:#fff;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
.auth-fi::placeholder{color:rgba(255,255,255,.2)}
.auth-fi:focus{border-color:var(--wc);background:rgba(38,173,228,.08)}
.auth-btn{font-family:var(--f);font-size:14px;font-weight:600;padding:14px;border-radius:var(--r);cursor:pointer;border:none;background:linear-gradient(135deg,var(--wc),var(--wcd));color:#fff;width:100%;margin-top:6px;letter-spacing:.02em;transition:opacity .15s;touch-action:manipulation}
.auth-btn:active{opacity:.85}

/* ── TOPBAR ── */
.topbar{height:58px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-logo svg{width:150px;height:auto;display:block}
.tb-div{width:1px;height:22px;background:var(--bd2);flex-shrink:0}
.tb-title{font-size:12px;font-weight:500;color:var(--tx3);letter-spacing:.04em;text-transform:uppercase}
.tb-sp{flex:1}
.tb-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 8px;border-radius:var(--r);position:relative;touch-action:manipulation}
.tb-user:active{background:var(--sur2)}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--wc),var(--wcd));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.tb-uinfo{display:flex;flex-direction:column}
.tb-uname{font-size:12px;font-weight:500;color:var(--tx);line-height:1.2}
.tb-urole{font-size:10px;color:var(--tx3)}
.umenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:6px;min-width:160px;display:none;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.umenu.on{display:block}
.umi{padding:9px 13px;font-size:13px;color:var(--tx2);border-radius:var(--r);cursor:pointer;transition:background .12s}
.umi:hover,.umi:active{background:var(--sur2);color:var(--tx)}
.umi.red{color:#dc2626}.umi.red:hover{background:#fee2e2}
.umi-div{height:1px;background:var(--bd);margin:4px 0}

/* ── MAIN ── */
.main{flex:1;padding:32px 20px;max-width:1100px;margin:0 auto;width:100%}
.greeting{margin-bottom:10px}
.greeting-name{font-size:24px;font-weight:700;color:var(--tx);line-height:1.2}
.greeting-sub{font-size:13px;color:var(--tx3);margin-top:5px}
.section-label{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin:32px 0 14px}

/* ── APP CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── APP CARD ── */
.app-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-decoration:none;display:flex;flex-direction:column;gap:12px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.app-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.app-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.app-card:active{transform:scale(.98);opacity:.9}
.app-card.locked{cursor:not-allowed;opacity:.5}
.app-card.locked:hover{transform:none;box-shadow:none}

/* Card colors */
.app-card.territori::before{background:linear-gradient(135deg,rgba(38,173,228,.06),rgba(14,106,150,.04))}
.app-card.territori:hover::before{opacity:1}
.app-card.territori .card-icon-bg{background:linear-gradient(135deg,var(--wc),var(--wcd))}
.app-card.prenotazioni::before{background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(5,150,105,.04))}
.app-card.prenotazioni:hover::before{opacity:1}
.app-card.prenotazioni .card-icon-bg{background:linear-gradient(135deg,#10b981,#059669)}
.app-card.materiale::before{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(217,119,6,.04))}
.app-card.materiale:hover::before{opacity:1}
.app-card.materiale .card-icon-bg{background:linear-gradient(135deg,#f59e0b,#d97706)}
.app-card.calendario::before{background:linear-gradient(135deg,rgba(139,92,246,.06),rgba(109,40,217,.04))}
.app-card.calendario:hover::before{opacity:1}
.app-card.calendario .card-icon-bg{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.app-card.incaricati::before{background:linear-gradient(135deg,rgba(20,184,166,.06),rgba(15,118,110,.04))}
.app-card.incaricati:hover::before{opacity:1}
.app-card.incaricati .card-icon-bg{background:linear-gradient(135deg,#14b8a6,#0f766e)}
.app-card.formazione::before{background:linear-gradient(135deg,rgba(236,72,153,.06),rgba(190,24,93,.04))}
.app-card.formazione:hover::before{opacity:1}
.app-card.formazione .card-icon-bg{background:linear-gradient(135deg,#ec4899,#be185d)}

.card-icon-bg{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.12);flex-shrink:0}
.card-icon-bg svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8}
.card-name{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3}
.card-desc{font-size:12px;color:var(--tx3);line-height:1.6;flex:1}
.card-badge{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--bd2);border-radius:20px;font-size:10px;font-weight:600;color:var(--tx3);padding:3px 9px;letter-spacing:.04em;align-self:flex-start}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-arrow{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:background .15s,transform .2s}
.app-card:hover .card-arrow{background:var(--wcl);transform:translateX(2px)}
.card-arrow svg{width:13px;height:13px;stroke:var(--tx3);fill:none;stroke-width:2}
.app-card:hover .card-arrow svg{stroke:var(--wcd)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--tx);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;max-width:90vw}
.toast.success{background:#059669}.toast.error{background:#dc2626}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:900px){
  .cards-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
  /* Topbar */
  .topbar{padding:0 14px;gap:10px;height:54px}
  .tb-title{display:none}
  .tb-div{display:none}
  .tb-logo svg{width:130px}
  .tb-uinfo{display:none}

  /* Main */
  .main{padding:20px 14px;padding-bottom:calc(20px + var(--safe-b))}
  .greeting-name{font-size:20px}
  .section-label{margin:24px 0 12px}

  /* Cards grid 1 col on small phones, 2 col on larger */
  .cards-grid{grid-template-columns:repeat(2,1fr);gap:10px}

  /* Card compact */
  .app-card{padding:16px 14px;gap:10px;border-radius:var(--r)}
  .card-icon-bg{width:40px;height:40px;border-radius:11px}
  .card-icon-bg svg{width:18px;height:18px}
  .card-name{font-size:13px}
  .card-desc{font-size:11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-footer{display:none}

  /* Auth */
  .auth-box{padding:28px 22px;border-radius:18px}
  .auth-logo svg{width:160px}
}

@media(max-width:360px){
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>

async function login(){
  const email=document.getElementById('lEmail').value.trim();
  const pwd=document.getElementById('lPwd').value;
  const btn=document.getElementById('lBtn'),err=document.getElementById('authErr');
  err.style.display='none';btn.textContent='Accesso...';btn.disabled=true;
  const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent='Credenziali non valide. Riprova.';err.style.display='block';btn.textContent='Accedi';btn.disabled=false;return;}
  await initApp(data.user);
}

async function logout(){await sb.auth.signOut();location.reload();}

async function initApp(user){
  const{data:profilo}=await sb.from('profili').select('*').eq('id',user.id).single();
  const nome=profilo?`${profilo.nome||''} ${profilo.cognome||''}`.trim()||user.email:user.email;
  const ruolo=profilo?.ruolo||'operatore';
  const moduli=profilo?.moduli||['territori'];
  const ini=nome.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
  const ora=new Date().getHours();
  const saluto=ora<12?'Buongiorno':ora<18?'Buon pomeriggio':'Buonasera';
  const primoNome=profilo?.nome||nome.split(' ')[0];
  const ruoloLabels={superadmin:'Super amministratore',supervisore:'Supervisore',operatore:'Operatore',visualizzatore:'Visualizzatore'};

  document.getElementById('topAv').textContent=ini;
  document.getElementById('topName').textContent=nome;
  document.getElementById('topRole').textContent=ruoloLabels[ruolo]||ruolo;
  document.getElementById('greetName').textContent=`${saluto}, ${primoNome} 👋`;
  const numModuli=ruolo==='superadmin'?TOOLS.length:moduli.length;
  document.getElementById('greetSub').textContent=`${numModuli} strument${numModuli===1?'o':'i'} disponibil${numModuli===1?'e':'i'}`;

  document.body.style.background='var(--bg)';
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('topbar').style.display='flex';
  document.getElementById('mainContent').style.display='block';

  renderCards(moduli, ruolo);
}

function renderCards(moduli, ruolo){
  const isSuperAdmin=ruolo==='superadmin';
  document.getElementById('cardsGrid').innerHTML=TOOLS.map(tool=>{
    const hasAccess=isSuperAdmin||moduli.includes(tool.id);
    const locked=!hasAccess;
    const cs=tool.comingSoon;
    return`<div class="app-card ${tool.color}${locked?' locked':''}" onclick="${locked?'':cs?`showComingSoon('${tool.name}')` :`openTool('${tool.url}')`}">
      <div class="card-icon-bg">${tool.icon}</div>
      <div>
        <div class="card-name">${tool.name}</div>
        <div class="card-desc">${tool.desc}</div>
      </div>
      ${cs||locked?`<span class="card-badge">${locked?'Accesso limitato':'Prossimamente'}</span>`:`
      <div class="card-footer">
        <span></span>
        <div class="card-arrow"><svg viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4"/></svg></div>
      </div>`}
    </div>`;
  }).join('');
}

function openTool(url){window.location.href=url;}
function showComingSoon(name){toast(`${name} — disponibile prossimamente`,'');}
function toggleMenu(){document.getElementById('uMenu').classList.toggle('on');}

function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3200);
}

document.addEventListener('click',e=>{if(!e.target.closest('.tb-user'))document.getElementById('uMenu').classList.remove('on');});
document.getElementById('lPwd').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session){document.body.style.background='var(--bg)';await initApp(session.user);}
  else{document.body.style.background='#0d1117';}
})();
</script>
