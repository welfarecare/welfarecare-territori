<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WelfareCare — Portale Organizzazione</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --wc:#26ADE4;--wcd:#1a8fc2;--wcdark:#0e6a96;
  --wcl:#e8f6fc;--wcm:#b3e2f5;
  --bg:#f0f4f8;--sur:#fff;--sur2:#f7f9fb;
  --bd:rgba(0,0,0,.07);--bd2:rgba(0,0,0,.12);
  --tx:#0d1117;--tx2:#4a5568;--tx3:#94a3b8;
  --f:'Poppins',sans-serif;
  --r:12px;--rl:18px;
}
body{font-family:var(--f);background:#0d1117;color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{height:58px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 32px;gap:16px;position:sticky;top:0;z-index:100}
.tb-logo svg{width:160px;height:auto;display:block}
.tb-div{width:1px;height:24px;background:var(--bd2);flex-shrink:0}
.tb-title{font-size:12px;font-weight:500;color:var(--tx3);letter-spacing:.04em;text-transform:uppercase}
.tb-sp{flex:1}
.tb-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 10px;border-radius:var(--r);position:relative;transition:background .15s}
.tb-user:hover{background:var(--sur2)}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--wc),var(--wcdark));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(38,173,228,.3)}
.tb-uname{font-size:13px;font-weight:500;color:var(--tx)}
.tb-urole{font-size:10px;color:var(--tx3)}
.umenu{position:absolute;top:calc(100% + 8px);right:0;background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:6px;min-width:170px;display:none;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.umenu.on{display:block}
.umi{padding:9px 13px;font-size:12px;color:var(--tx2);border-radius:var(--r);cursor:pointer;transition:background .12s}
.umi:hover{background:var(--sur2);color:var(--tx)}
.umi.red{color:#dc2626}.umi.red:hover{background:#fef2f2}
.umi-div{height:1px;background:var(--bd);margin:4px 0}

/* ── AUTH OVERLAY ── */
.auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0d1117 0%,#1a2744 50%,#0e3a5c 100%);display:flex;align-items:center;justify-content:center;z-index:500}
.auth-overlay.hidden{display:none}
.auth-box{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:44px 40px;width:420px;text-align:center}
.auth-logo{margin-bottom:32px}
.auth-logo svg{width:200px;height:auto;display:inline-block}
.auth-tagline{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px;font-weight:400}
.auth-err{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:var(--r);margin-bottom:14px;display:none;text-align:left}
.auth-fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;text-align:left}
.auth-fl{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.03em}
.auth-fi{font-family:var(--f);font-size:13px;padding:12px 14px;border:1px solid rgba(255,255,255,.12);border-radius:var(--r);background:rgba(255,255,255,.06);color:#fff;width:100%;outline:none;transition:border-color .15s}
.auth-fi::placeholder{color:rgba(255,255,255,.2)}
.auth-fi:focus{border-color:var(--wc);background:rgba(38,173,228,.08)}
.auth-btn{font-family:var(--f);font-size:13px;font-weight:600;padding:13px;border-radius:var(--r);cursor:pointer;border:none;background:linear-gradient(135deg,var(--wc),var(--wcdark));color:#fff;width:100%;margin-top:6px;letter-spacing:.02em;transition:opacity .15s,transform .1s}
.auth-btn:hover{opacity:.92;transform:translateY(-1px)}
.auth-btn:active{transform:translateY(0)}
.auth-dots{display:flex;justify-content:center;gap:6px;margin-top:28px}
.auth-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15)}
.auth-dot.on{background:var(--wc)}

/* ── MAIN ── */
.main{flex:1;padding:48px 32px;max-width:1100px;margin:0 auto;width:100%}
.greeting{margin-bottom:10px}
.greeting-name{font-size:26px;font-weight:600;color:var(--tx)}
.greeting-sub{font-size:14px;color:var(--tx3);margin-top:4px}
.section-label{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin:40px 0 16px}

/* ── APP CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.app-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);padding:28px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-decoration:none;display:block}
.app-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.app-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.app-card.locked{cursor:not-allowed;opacity:.55}
.app-card.locked:hover{transform:none;box-shadow:none}

/* Territori — blu */
.app-card.territori::before{background:linear-gradient(135deg,rgba(38,173,228,.06),rgba(14,106,150,.04))}
.app-card.territori:hover::before{opacity:1}
.app-card.territori .card-icon-bg{background:linear-gradient(135deg,var(--wc),var(--wcdark))}

/* Prenotazioni — verde */
.app-card.prenotazioni::before{background:linear-gradient(135deg,rgba(16,185,129,.06),rgba(5,150,105,.04))}
.app-card.prenotazioni:hover::before{opacity:1}
.app-card.prenotazioni .card-icon-bg{background:linear-gradient(135deg,#10b981,#059669)}

/* Materiale — arancio */
.app-card.materiale::before{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(217,119,6,.04))}
.app-card.materiale:hover::before{opacity:1}
.app-card.materiale .card-icon-bg{background:linear-gradient(135deg,#f59e0b,#d97706)}

/* Calendario — viola */
.app-card.calendario::before{background:linear-gradient(135deg,rgba(139,92,246,.06),rgba(109,40,217,.04))}
.app-card.calendario:hover::before{opacity:1}
.app-card.calendario .card-icon-bg{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}

/* Formazione — rosa/rosso */
.app-card.formazione::before{background:linear-gradient(135deg,rgba(236,72,153,.06),rgba(190,24,93,.04))}
.app-card.formazione:hover::before{opacity:1}
.app-card.formazione .card-icon-bg{background:linear-gradient(135deg,#ec4899,#be185d)}

.card-icon-bg{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.card-icon-bg svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8}
.card-name{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:6px}
.card-desc{font-size:12px;color:var(--tx3);line-height:1.6}

.card-badge{position:absolute;top:20px;right:20px;background:var(--bg);border:1px solid var(--bd2);border-radius:20px;font-size:10px;font-weight:600;color:var(--tx3);padding:3px 9px;letter-spacing:.04em}

/* ── RECENT ── */
.recent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.recent-item{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.recent-item:hover{border-color:var(--wcm);background:var(--wcl)}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-meta{font-size:10px;color:var(--tx3);margin-top:2px}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--tx);color:#fff;padding:12px 18px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.success{background:#059669}.toast.error{background:#dc2626}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .cards-grid,.recent-grid{grid-template-columns:1fr}
  .main{padding:24px 16px}
  .topbar{padding:0 16px}
}
</style>
</head>

<script>
const SB_URL = 'https://koshtsgvfqwuhoykfqai.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtvc2h0c2d2ZnF3dWhveWtmcWFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDg4MTQsImV4cCI6MjA5MjI4NDgxNH0.6a9t7zCVwJX3eD1dv0E2d_dR9VUH4Ie7coEUvsRiRJU';
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let currentProfilo = null;

// ── DEFINIZIONE STRUMENTI ──────────────────────────────
const TOOLS = [
  {
    id: 'territori',
    name: 'Gestionale Territori',
    desc: 'Gestisci comuni, province e regioni. Pianifica i programmi annuali degli incaricati e archivia le edizioni precedenti.',
    url: '/territori/',
    color: 'territori',
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3.5"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>`,
    comingSoon: false
  },
  {
    id: 'prenotazioni',
    name: 'Prenotazioni',
    desc: 'Gestisci le prenotazioni degli eventi, i calendari e le disponibilità per ogni territorio assegnato.',
    url: '/prenotazioni/',
    color: 'prenotazioni',
    icon: `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`,
    comingSoon: false
  },
  {
    id: 'materiale',
    name: 'Materiale',
    desc: 'Accedi a documenti, moduli, presentazioni e tutto il materiale operativo necessario per gli eventi.',
    url: '/materiale/',
    color: 'materiale',
    icon: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    comingSoon: false
  },
  {
    id: 'calendario',
    name: 'Calendario',
    desc: 'Visualizza e gestisci il calendario degli eventi, le date degli appuntamenti e le scadenze operative.',
    url: '/calendario/',
    color: 'calendario',
    icon: `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg>`,
    comingSoon: false
  },
  {
    id: 'formazione',
    name: 'Formazione',
    desc: 'Accedi ai materiali formativi, corsi e risorse di aggiornamento per il personale WelfareCare.',
    url: '/formazione/',
    color: 'formazione',
    icon: `<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
    comingSoon: true
  }
];

// ── AUTH ───────────────────────────────────────────────
async function login() {
  const email = document.getElementById('lEmail').value.trim();
  const pwd = document.getElementById('lPwd').value;
  const btn = document.getElementById('lBtn');
  const err = document.getElementById('authErr');
  err.style.display = 'none';
  btn.textContent = 'Accesso in corso...'; btn.disabled = true;
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) {
    err.textContent = 'Credenziali non valide. Riprova.';
    err.style.display = 'block';
    btn.textContent = 'Accedi'; btn.disabled = false;
    return;
  }
  await initApp(data.user);
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function initApp(user) {
  currentUser = user;
  const { data: profilo } = await sb.from('profili').select('*').eq('id', user.id).single();
  currentProfilo = profilo;

  const nome = profilo ? `${profilo.nome||''} ${profilo.cognome||''}`.trim() || user.email : user.email;
  const ruolo = profilo?.ruolo || 'operatore';
  const moduli = profilo?.moduli || ['territori'];
  const ini = nome.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2) || '??';
  const ora = new Date().getHours();
  const saluto = ora < 12 ? 'Buongiorno' : ora < 18 ? 'Buon pomeriggio' : 'Buonasera';

  document.getElementById('topAv').textContent = ini;
  document.getElementById('topName').textContent = nome;
  document.getElementById('topRole').textContent = ruoloLabel(ruolo);
  document.getElementById('greetName').textContent = `${saluto}, ${profilo?.nome || nome.split(' ')[0]} 👋`;
  document.getElementById('greetSub').textContent = `Hai accesso a ${moduli.length} strument${moduli.length===1?'o':'i'}. Cosa vuoi fare oggi?`;

  // Nascondi overlay, mostra app
  document.body.style.background = 'var(--bg)';
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'block';

  // Genera cards in base ai permessi
  renderCards(moduli, ruolo);
}

function ruoloLabel(r) {
  return { superadmin:'Super amministratore', supervisore:'Supervisore', operatore:'Operatore', visualizzatore:'Visualizzatore' }[r] || r;
}

function renderCards(moduli, ruolo) {
  const grid = document.getElementById('cardsGrid');
  const isSuperAdmin = ruolo === 'superadmin';

  grid.innerHTML = TOOLS.map(tool => {
    const hasAccess = isSuperAdmin || moduli.includes(tool.id);
    const locked = !hasAccess;
    const cs = tool.comingSoon;

    return `<div class="app-card ${tool.color}${locked ? ' locked' : ''}" 
      onclick="${locked ? '' : cs ? `showComingSoon('${tool.name}')` : `openTool('${tool.url}')`}">
      <div class="card-icon-bg">${tool.icon}</div>
      ${cs ? `<span class="card-badge">Prossimamente</span>` : ''}
      ${locked ? `<span class="card-badge">Accesso non consentito</span>` : ''}
      <div class="card-name">${tool.name}</div>
      <div class="card-desc">${tool.desc}</div>

    </div>`;
  }).join('');
}

function openTool(url) {
  window.location.href = url;
}

function showComingSoon(name) {
  toast(`${name} — disponibile prossimamente`, '');
}

function gestisciProfilo() {
  toast('Gestione profilo — prossimamente', '');
  document.getElementById('uMenu').classList.remove('on');
}

function toggleMenu() {
  document.getElementById('uMenu').classList.toggle('on');
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type||'');
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display='none', 3200);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.tb-user')) document.getElementById('uMenu').classList.remove('on');
});
document.getElementById('lPwd').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// ── INIT ──────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { document.body.style.background='var(--bg)'; await initApp(session.user); }
})();
</script>
